name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release checks
        run: npm test

      - name: Compile Python examples
        run: python -m py_compile examples/python/*.py scripts/*.py

      - name: Install example validators
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python -m pip install cfn-lint nbclient nbformat ipykernel

      - name: Validate shell environment profiles
        run: shellcheck --shell=bash examples/env/*.env.example

      - name: Validate CloudFormation examples
        run: cfn-lint examples/infra/*.yml

      - name: Execute validation notebook
        env:
          RUN_LIVE_BEDROCK: "0"
        run: |
          python scripts/execute-notebook.py \
            notebooks/azure_openai_to_amazon_bedrock_validation.ipynb \
            --output /tmp/azure_openai_to_amazon_bedrock_validation.executed.ipynb

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
