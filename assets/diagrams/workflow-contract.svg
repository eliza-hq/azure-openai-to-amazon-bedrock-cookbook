<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow contract</title>
  <desc id="desc">A procurement request moves through persistence, rules, retrieval, model explanation, and audit state.</desc>
  <rect width="980" height="300" rx="16" fill="#F7F7F4"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="36" y="45" fill="#0F0F0F" font-size="18" font-weight="700">Workflow contract</text>
    <text x="36" y="69" fill="#6B6B66" font-size="13">The provider can change. The business contract stays fixed.</text>

    <g transform="translate(36 112)">
      <rect width="150" height="86" rx="10" fill="#FFFFFF" stroke="#D8D8D0"/>
      <text x="18" y="32" fill="#0F0F0F" font-size="15" font-weight="700">Request</text>
      <text x="18" y="56" fill="#6B6B66" font-size="12">Durable ID</text>
      <text x="18" y="73" fill="#6B6B66" font-size="12">Payload and actor</text>
    </g>
    <g transform="translate(228 112)">
      <rect width="150" height="86" rx="10" fill="#E7F6F1" stroke="#92D9C7"/>
      <text x="18" y="32" fill="#0B6B57" font-size="15" font-weight="700">Rules</text>
      <text x="18" y="56" fill="#31554C" font-size="12">Approvals</text>
      <text x="18" y="73" fill="#31554C" font-size="12">Workflow state</text>
    </g>
    <g transform="translate(420 112)">
      <rect width="150" height="86" rx="10" fill="#FFF7E6" stroke="#E2C77D"/>
      <text x="18" y="32" fill="#7B5B00" font-size="15" font-weight="700">Retrieval</text>
      <text x="18" y="56" fill="#6B520F" font-size="12">Policy sections</text>
      <text x="18" y="73" fill="#6B520F" font-size="12">Citations</text>
    </g>
    <g transform="translate(612 112)">
      <rect width="150" height="86" rx="10" fill="#FFFFFF" stroke="#D8D8D0"/>
      <text x="18" y="32" fill="#0F0F0F" font-size="15" font-weight="700">Model</text>
      <text x="18" y="56" fill="#6B6B66" font-size="12">Explanation</text>
      <text x="18" y="73" fill="#6B6B66" font-size="12">Escalation draft</text>
    </g>
    <g transform="translate(804 112)">
      <rect width="140" height="86" rx="10" fill="#FFFFFF" stroke="#D8D8D0"/>
      <text x="18" y="32" fill="#0F0F0F" font-size="15" font-weight="700">Audit</text>
      <text x="18" y="56" fill="#6B6B66" font-size="12">Events</text>
      <text x="18" y="73" fill="#6B6B66" font-size="12">Status history</text>
    </g>
  </g>

  <g stroke="#8A8A83" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M194 155H219"/>
    <path d="M214 149L221 155L214 161"/>
    <path d="M386 155H411"/>
    <path d="M406 149L413 155L406 161"/>
    <path d="M578 155H603"/>
    <path d="M598 149L605 155L598 161"/>
    <path d="M770 155H795"/>
    <path d="M790 149L797 155L790 161"/>
  </g>

  <rect x="219" y="226" width="286" height="34" rx="17" fill="#E7F6F1" stroke="#92D9C7"/>
  <text x="244" y="248" fill="#0B6B57" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">Decisions stay outside the model</text>
</svg>

