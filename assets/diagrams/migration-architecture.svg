    <text x="68" y="124" fill="#164B7A">Azure OpenAI</text>
    <rect x="52" y="154" width="222" height="42" rx="8" fill="#EAF4FF" stroke="#99C7F3"/>
    <text x="68" y="180" fill="#164B7A">Azure AI Search</text>
    <rect x="52" y="210" width="222" height="42" rx="8" fill="#EAF4FF" stroke="#99C7F3"/>
    <text x="68" y="236" fill="#164B7A">Blob Storage</text>
    <rect x="52" y="266" width="222" height="42" rx="8" fill="#EAF4FF" stroke="#99C7F3"/>
    <text x="68" y="292" fill="#164B7A">Cosmos DB</text>
    <rect x="52" y="322" width="222" height="42" rx="8" fill="#EAF4FF" stroke="#99C7F3"/>
    <text x="68" y="348" fill="#164B7A">App Service / Container Apps</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">
    <rect x="379" y="98" width="222" height="42" rx="8" fill="#F1F1EC" stroke="#D8D8D0"/>
