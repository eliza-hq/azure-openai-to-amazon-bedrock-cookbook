<svg width="980" height="420" viewBox="0 0 980 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Azure to AWS migration architecture</title>
  <desc id="desc">Azure services on the left map through a stable workflow contract to AWS services on the right.</desc>
  <rect width="980" height="420" rx="16" fill="#F7F7F4"/>
  <rect x="28" y="32" width="270" height="356" rx="14" fill="#FFFFFF" stroke="#D8D8D0"/>
  <rect x="355" y="32" width="270" height="356" rx="14" fill="#FFFFFF" stroke="#D8D8D0"/>
  <rect x="682" y="32" width="270" height="356" rx="14" fill="#FFFFFF" stroke="#D8D8D0"/>

  <text x="52" y="67" fill="#0F0F0F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Azure source</text>
  <text x="379" y="67" fill="#0F0F0F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Stable app contract</text>
  <text x="706" y="67" fill="#0F0F0F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">AWS target</text>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">
