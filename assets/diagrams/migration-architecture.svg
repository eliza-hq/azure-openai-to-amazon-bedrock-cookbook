    <rect x="379" y="154" width="222" height="42" rx="8" fill="#E7F6F1" stroke="#92D9C7"/>
    <text x="395" y="180" fill="#0B6B57">Deterministic rules</text>
    <rect x="379" y="210" width="222" height="42" rx="8" fill="#FFF7E6" stroke="#E2C77D"/>
    <text x="395" y="236" fill="#7B5B00">Policy citations</text>
    <rect x="379" y="266" width="222" height="42" rx="8" fill="#F1F1EC" stroke="#D8D8D0"/>
    <text x="395" y="292" fill="#292927">Generated explanation</text>
    <rect x="379" y="322" width="222" height="42" rx="8" fill="#F1F1EC" stroke="#D8D8D0"/>
