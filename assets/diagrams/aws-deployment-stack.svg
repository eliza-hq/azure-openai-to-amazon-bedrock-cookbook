<svg width="980" height="440" viewBox="0 0 980 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AWS deployment stack</title>
  <desc id="desc">The AWS deployment stack includes App Runner or ECS, an IAM runtime role, OpenAI on Bedrock, S3 policy storage, OpenSearch or Bedrock Knowledge Bases retrieval, DynamoDB workflow state, and CloudWatch observability.</desc>
  <rect width="980" height="440" rx="16" fill="#F7F7F4"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="38" y="48" fill="#0F0F0F" font-size="18" font-weight="700">AWS stack deployed by the migration</text>
    <text x="38" y="72" fill="#6B6B66" font-size="13">One runtime role connects the app to generation, retrieval, state, storage, and logs.</text>
  </g>

  <rect x="44" y="118" width="174" height="88" rx="12" fill="#FFFFFF" stroke="#D8D8D0"/>
  <text x="66" y="148" fill="#0F0F0F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Users</text>
  <text x="66" y="171" fill="#6B6B66" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">Procurement UI</text>
  <text x="66" y="188" fill="#6B6B66" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">API clients</text>

  <rect x="278" y="94" width="218" height="136" rx="14" fill="#FFFFFF" stroke="#D8D8D0"/>
  <text x="302" y="126" fill="#0F0F0F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Application runtime</text>
  <text x="302" y="150" fill="#6B6B66" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">App Runner or ECS/Fargate</text>
  <rect x="302" y="170" width="170" height="34" rx="8" fill="#F1F1EC" stroke="#D8D8D0"/>
  <text x="320" y="192" fill="#292927" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" font-weight="700">FastAPI + Streamlit</text>

  <rect x="278" y="268" width="218" height="82" rx="14" fill="#101010"/>
  <text x="302" y="299" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">Runtime IAM role</text>
  <text x="302" y="323" fill="#D9D9D3" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">Least-privilege service access</text>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="586" y="94" width="160" height="76" rx="12" fill="#E7F6F1" stroke="#92D9C7"/>
    <text x="606" y="124" fill="#0B6B57" font-size="14" font-weight="700">Bedrock</text>
    <text x="606" y="146" fill="#31554C" font-size="12">OpenAI model</text>

    <rect x="786" y="94" width="150" height="76" rx="12" fill="#E7F6F1" stroke="#92D9C7"/>
    <text x="806" y="124" fill="#0B6B57" font-size="14" font-weight="700">S3</text>
    <text x="806" y="146" fill="#31554C" font-size="12">Policy corpus</text>

    <rect x="586" y="206" width="160" height="84" rx="12" fill="#FFF7E6" stroke="#E2C77D"/>
    <text x="606" y="236" fill="#7B5B00" font-size="14" font-weight="700">Retrieval</text>
    <text x="606" y="258" fill="#6B520F" font-size="12">OpenSearch or</text>
    <text x="606" y="275" fill="#6B520F" font-size="12">Knowledge Bases</text>

    <rect x="786" y="206" width="150" height="84" rx="12" fill="#E7F6F1" stroke="#92D9C7"/>
    <text x="806" y="236" fill="#0B6B57" font-size="14" font-weight="700">DynamoDB</text>
    <text x="806" y="258" fill="#31554C" font-size="12">Requests</text>
    <text x="806" y="275" fill="#31554C" font-size="12">Audit events</text>

    <rect x="586" y="326" width="350" height="58" rx="12" fill="#FFFFFF" stroke="#D8D8D0"/>
    <text x="606" y="357" fill="#0F0F0F" font-size="14" font-weight="700">CloudWatch and CloudTrail</text>
    <text x="806" y="357" fill="#6B6B66" font-size="12">Logs, traces, request IDs</text>
  </g>

